<div class="dashboard-container">
  <h2 class="text-center" style="margin-top: 4rem;">
    Welcome To <span class="brand-text">Bokaro Steel People Welfare Association</span>
  </h2>

  <div class="card-grid">
    <!-- Member Details Card -->
    <div class="dashboard-card" (click)="open_member()">
      <img src="/assets/images/icon/employees.png" width="40" alt="Member">
      <p><b>Member Details</b></p>
    </div>

    <!-- Subscription Deposit Card -->
    <div class="dashboard-card" (click)="open_deposit_subscription()">
      <img src="/assets/images/subscription_deposit.jpg" width="40" alt="Subscription Deposit">
      <p><b>Subscription Deposit</b></p>
    </div>

    <!-- Insurance Form Card -->
    <div class="dashboard-card" (click)="open_insurance_details()">
      <img src="/assets/images/icon/cashless-payment.png" width="40" alt="Insurance Details">
      <p><b>Insurance Details</b></p>
    </div>

    <!-- Transaction History Card -->
    <div class="dashboard-card" (click)="open_trn_history()">
      <img src="/assets/images/icon/bill.png" width="40" alt="Transaction History">
      <p><b>Transaction History</b></p>
    </div>

    <!-- Download Ecard Card -->
    <div class="dashboard-card" (click)="open_e_card()">
      <img src="/assets/images/icon/card.png" width="40" alt="Download Ecard">
      <p><b>Download Ecard</b></p>
    </div>
  </div>
</div>
