  <div class="main-wrapper" [class.expanded]="isExpanded" 
(mouseenter)="isExpanded = true" 
(mouseleave)="isExpanded = false">
  <div class="sidebar">
    <ul class="sidebar-menu">
      <li *ngFor="let item of items" 
       class="menu-item"
       [ngClass]="{ 'active': isActive(item.routerLink) }"
      (click)="selectedItem = item; navigate(item.routerLink)">
      <div class="menu-box">
        <i class="pi" [ngClass]="item.icon"></i>
        <span class="label">{{ item.label }}</span>
        </div>
      </li>
    </ul>
  </div>
