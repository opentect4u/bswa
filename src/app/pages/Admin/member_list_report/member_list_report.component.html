<div class="change-password-container">
  <div class="change-password-box">
    <h3 class="flex align-items-center">
      <i class="pi pi-users menu-icon" style="font-size: 1.5rem; margin-right: 10px;"></i>
      <b>Member Register Report</b>
    </h3>
    <p-divider type="dashed"></p-divider>

    <form [formGroup]="form">
      <div class="formgrid grid mt-4">
        <div class="field col-12 md:col-6">
          <label for="period" class="label_field"><b>Period:<span class="text-red-700">*</span></b></label>
          <input id="period" type="date" formControlName="period" placeholder="dd/MM/yyyy" style="font-weight: bold;" />
        </div>
        <div class="field col-12 md:col-6">
          <label for="member_type" class="label_field"><b>Member Type:<span class="text-red-700">*</span></b></label>
          <select id="member_type" formControlName="member_type" [(ngModel)]="selectedValue" style="font-weight: bold;">
            <option value="N">Select Member Type</option>
            <option value="A">All</option>
            <option value="G">General Membership</option>
            <option value="L">Life Membership</option>
            <option value="AI">Associate Membership</option>
          </select>
        </div>
      </div>

      <div class="formgrid grid mt-4 justify-content-center">
        <div class="field col-12 md:col-4 text-center">
          <button pButton pRipple type="button" label="Submit" class="p-button-raised sub_btn" [disabled]="form.invalid" (click)="submit_btn()"></button>
        </div>
      </div>
    </form>
  </div>
</div>
