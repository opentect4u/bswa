<div class="page-wrapper">
  <div class="card-container">
     <h3 class="title">Members List</h3>

       <div class="search-box">
        <i class="fa fa-search"></i>
        <input
          type="text"
          placeholder="Search Form No / Member Name"
          (input)="filterRes($event)"
        />
      </div>
    
     <div class="table-responsive">
      <table class="member-table">
        <thead>
          <tr>
            <th class="text-center">Sl No</th>
            <th class="text-center">Form No</th>
            <th class="text-center">Member ID</th>
            <th class="text-center">Member Name</th>
            <th class="text-center">Type</th>
            <th class="text-center">Action</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let memb of tableData; let i = index">
            <td class="text-center">{{ i + 1 }}</td>
            <td class="text-center">{{ memb.form_no }}</td>
            <td class="text-center">{{ memb.member_id }}</td>
            <td class="text-center">{{ memb.memb_name }}</td>
            <td class="text-center"> <span
                class="badge"
                [class.active]="memb.mem_type === 'G' || memb.mem_type === 'AI' || memb.mem_type === 'L'"
              >
                {{ memb.mem_type === 'G' ? 'General' : memb.mem_type == "AI" ? 'Associate' : 'Life' }}
              </span>
            </td>
           <td class="text-center">
             <i class="fa fa-edit view-icon" title="View Member" (click)="preview(memb.form_no, memb.member_id)"></i>
           </td>
          </tr>
          <tr *ngIf="tableData.length === 0">
            <td colspan="6" class="text-center">No data found</td>
          </tr>
        </tbody>
      </table>
      <div class="table-responsive">

  <table class="member-table">
    <!-- your existing thead & tbody -->
  </table>

  <!-- 🔽 ADD PAGINATION HERE -->
  <div class="pagination-bar" *ngIf="totalRecords > limit">
  <button
    class="pg-btn prev-btn"
    (click)="prevPage()"
    [disabled]="page === 1">
    ‹ Prev
  </button>

  <span class="page-info">
    Page {{ page }} of {{ totalPages }}
  </span>

  <button
    class="pg-btn next-btn"
    (click)="nextPage()"
    [disabled]="page * limit >= totalRecords">
    Next ›
  </button>
</div>


</div>

</div>
  </div>
</div>
