<div class="change-password-container">
  <div class="change-password-box">
    <h3 class="flex align-items-center">
      <i class="pi pi-money-bill menu-icon" style="font-size: 1.5rem; margin-right: 10px;"></i>
      <b>STP Member Transaction Report</b>
    </h3>
    <p-divider type="dashed"></p-divider>

    <form [formGroup]="form">
      <div class="formgrid grid mt-4">
        <div class="field col-12 md:col-3">
          <label for="from_dt" class="label_field"><b>From Date:<span class="text-red-700">*</span></b></label>
          <input id="from_dt" type="date" formControlName="from_dt" placeholder="dd/MM/yyyy"
            style="font-weight: bold;" />
        </div>
        <div class="field col-12 md:col-3">
          <label for="to_dt" class="label_field"><b>To Date:<span class="text-red-700">*</span></b></label>
          <input id="to_dt" type="date" formControlName="to_dt" placeholder="dd/MM/yyyy" style="font-weight: bold;" />
        </div>
        <div class="field col-12 md:col-3">
          <label for="memb_oprn" class="label_field"><b>Member Type:<span class="text-red-700">*</span></b></label>
          <select id="memb_oprn" formControlName="memb_oprn" style="font-weight: bold;">
            <option value="">Select Member Type</option>
            <option value="A">Select All</option>
            <option *ngFor="let option of memb_oprn" [value]="option.id">{{ option.value }}</option>
          </select>
        </div>
        <div class="field col-12 md:col-3">
          <label for="fin_year" class="label_field"><b>Financial Year:<span class="text-red-700">*</span></b></label>
          <select id="fin_year" formControlName="fin_year" style="font-weight: bold;">
            <option value="">Select Year</option>
            <option *ngFor="let year of fin_years" [value]="year">{{ year }}</option>
          </select>
        </div>
      </div>

      <div class="formgrid grid mt-4 justify-content-center">
        <div class="field col-12 md:col-4 text-center">
          <button pButton pRipple type="button" label="Submit" class="p-button-raised sub_btn" [disabled]="form.invalid"
            (click)="submit_btn_trans()"></button>
        </div>
      </div>
    </form>
  </div>
</div>
